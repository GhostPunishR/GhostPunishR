# À placer dans : .github/workflows/profile-summary-cards.yml
# Dépôt : GhostPunishR/GhostPunishR
#
# Génère les 5 cartes "Résumé du profil" (profile-details, repos-per-language,
# most-commit-language, stats, productive-time) et les push automatiquement
# dans le dossier profile-summary-card-output/.

name: Profile summary cards

on:
  schedule:
    - cron: "0 4 * * *" # Tous les jours à 04:00 UTC
  push:
    paths:
      - ".github/workflows/profile-summary-cards.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # SUMMARY_GITHUB_TOKEN est recommandé pour des stats plus complètes.
          # Si le secret n'existe pas, le workflow utilise GITHUB_TOKEN.
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          UTC_OFFSET: 2 # Heure de Paris en été ; remets 1 en hiver si tu veux être précis
          EXCLUDE: ""
          AUTO_PUSH: true
