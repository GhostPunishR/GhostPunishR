# À placer dans : .github/workflows/profile-summary-cards.yml
# Dépôt : GhostPunishR/GhostPunishR
#
# Génère les 5 cartes "Résumé du profil" (profile-details, repos-per-language,
# most-commit-language, stats, productive-time) et les push automatiquement
# dans le dossier profile-summary-card-output/.

name: Profile summary cards

on:
  schedule:
    - cron: "0 4 * * *" # Tous les jours à 04:00 UTC (décalé d'1h pour éviter un conflit de push avec l'autre workflow)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # GITHUB_TOKEN suffit pour les stats publiques.
          # Pour inclure les dépôts privés : crée un PAT (scopes repo + read:user),
          # ajoute-le en secret (ex. SUMMARY_GITHUB_TOKEN) et remplace la ligne ci-dessous.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          UTC_OFFSET: 1 # Heure de Paris (passe à 2 en été si tu veux être précis, sinon laisse 1)
