# À placer dans : .github/workflows/update-profile-cards.yml
# Dépôt : GhostPunishR/GhostPunishR
#
# Génère les cartes stats, top-langs et streak en SVG statiques,
# commit directement dans le dépôt. Plus aucune dépendance aux
# serveurs publics Vercel/Demolab pour ces 3 cartes locales.

name: Update profile cards

on:
  schedule:
    - cron: "0 3 * * *" # Tous les jours à 03:00 UTC
  push:
    paths:
      - ".github/workflows/update-profile-cards.yml" # Relance si le workflow est modifié
  workflow_dispatch: # Lancement manuel depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Nécessaire pour committer les SVG

    steps:
      - uses: actions/checkout@v4

      # ---- Carte "GitHub Stats" (étoiles, commits, PRs, issues, rank) ----
      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&card_width=420&bg_color=141321&title_color=FF0055&text_color=03D8F3&icon_color=FCEE0C&ring_color=FF0055
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---- Carte "Top Languages" ----
      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&hide_border=true&card_width=420&bg_color=141321&title_color=FF0055&text_color=03D8F3
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---- Carte "Streak" (contributions, série en cours, record) ----
      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&hide_border=true&background=141321&stroke=FF0055&ring=FF0055&fire=FCEE0C&currStreakLabel=03D8F3&sideLabels=03D8F3&currStreakNum=FCEE0C&sideNums=FCEE0C&dates=03D8F3
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---- Commit des SVG générés ----
      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update profile cards" || exit 0
          git pull --rebase origin main
          git push
