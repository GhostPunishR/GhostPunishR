name: Update profile cards

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    paths:
      - ".github/workflows/update-profile-cards.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: anuraghazra/github-readme-stats@master
        with:
          username: ${{ github.repository_owner }}
          show_icons: true
          hide_border: true
          card_width: 420
          bg_color: 141321
          title_color: FF0055
          text_color: 03D8F3
          icon_color: FCEE0C
          ring_color: FF0055
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: anuraghazra/github-readme-stats@master
        with:
          username: ${{ github.repository_owner }}
          layout: compact
          hide_border: true
          card_width: 420
          bg_color: 141321
          title_color: FF0055
          text_color: 03D8F3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@master
        with:
          user: ${{ github.repository_owner }}
          hide_border: true
          background: 141321
          stroke: FF0055
          ring: FF0055
          fire: FCEE0C
          currStreakLabel: 03D8F3
          sideLabels: 03D8F3
          currStreakNum: FCEE0C
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download generated cards
        run: |
          mkdir -p profile
          # Les cartes seront générées et committées par les actions précédentes

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update profile cards" || exit 0
          git pull --rebase origin main || true
          git push || exit 0
